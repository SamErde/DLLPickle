name: Upstream Compatibility

on:
  workflow_dispatch:
    inputs:
      create_pull_request:
        description: "Create a pull request when a safe candidate dependency update is generated."
        required: false
        default: true
        type: boolean
  schedule:
    - cron: "34 8 * * *"
  pull_request:
    # No path filter: always trigger on PRs to main so the "Validate upstream compatibility tooling"
    # required check always reports. The job is gated below by `pr-changes` — skipped (== passing
    # required check) on PRs that don't touch the tooling/policy paths.
    branches: [main]

permissions:
  contents: read

concurrency:
  group: upstream-compatibility-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  pr-changes:
    name: Detect tooling/policy changes
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      relevant: ${{ steps.detect.outputs.relevant }}
      live_validation: ${{ steps.detect.outputs.live_validation }}
    steps:
      - name: Detect whether upstream-compatibility paths changed
        id: detect
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Detection is intentionally INLINE (not a shared .github/ci-scripts script): keeping the
          # merge-gate logic in the workflow file benefits from GitHub's stricter workflow-edit review,
          # so a PR can't relocate it to a less-scrutinized script and tamper the skip decision (#228).
          # Fail-safe: default relevant=true so any error enumerating changed files runs the
          # validation rather than silently skipping a required check. Paginated REST files endpoint
          # (gh pr view --json files caps at 100 files and could miss a later build/ or tools/ change).
          $Relevant = $true
          $LiveValidation = $true
          try {
              $ErrorActionPreference = 'Stop'
              # Project previous_filename too, so a rename moving a tracked file OUT of a matched tree
              # (reported as the new path in .filename, old path in .previous_filename) is still seen.
              $Files = gh api "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" --paginate --jq '.[] | .filename, (.previous_filename // empty)'
              # Native non-zero exits don't reliably throw in pwsh, so check explicitly -> fail-safe.
              if ($LASTEXITCODE -ne 0) { throw "gh api exited $LASTEXITCODE while listing PR files" }
              $Patterns = @('^build/', '^src/DLLPickle\.Build/', '^tests/', '^tools/', '^\.github/workflows/Upstream-Compatibility\.yml$')
              # Any change that can alter the accepted baseline or the fingerprint computation must
              # prove itself against a fresh upstream inventory. Comparator/tests/workflow-only changes
              # stay on the deterministic smoke path so a pre-existing external drift does not prevent
              # the guardrail itself from being repaired.
              $LivePatterns = @(
                '^build/dependency-policy\.json$',
                '^src/DLLPickle\.Build/DLLPickle\.csproj$',
                '^src/DLLPickle\.Build/packages\.lock\.json$',
                '^tools/Get-DLLPickleUpstreamInventory\.ps1$',
                '^tools/New-DLLPickleConflictMatrix\.ps1$'
              )
              $Relevant = $false
              $LiveValidation = $false
              foreach ($File in $Files) {
                  foreach ($Pattern in $Patterns) {
                      if ($File -match $Pattern) { $Relevant = $true }
                  }
                  foreach ($Pattern in $LivePatterns) {
                      if ($File -match $Pattern) { $LiveValidation = $true }
                  }
              }
          } catch {
              Write-Host "::warning::Changed-file detection failed; defaulting to relevant=true and live_validation=true (fail-safe). $_"
              $Relevant = $true
              $LiveValidation = $true
          }
          "relevant=$($Relevant.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "live_validation=$($LiveValidation.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "Upstream-compatibility-relevant change detected: $Relevant"
          Write-Host "Live upstream validation required: $LiveValidation"

  pr-smoke-validation:
    name: Validate upstream compatibility implementation
    needs: pr-changes
    # Runs on PRs that touch the tooling/policy paths; skipped (== passing required check) only when
    # detection conclusively says false. always() + `!= 'false'` makes it FAIL-SAFE: if pr-changes
    # fails or its output is unknown, the validation still runs rather than being skipped (which would
    # otherwise satisfy the required check without actually validating a relevant PR).
    if: ${{ always() && github.event_name == 'pull_request' && needs.pr-changes.outputs.relevant != 'false' }}
    runs-on: windows-2025
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: "8.0.x"
          # This job runs only Analyze,Test (PowerShell) and performs no `dotnet restore`, so the
          # NuGet global-packages folder is never created. Enabling the setup-dotnet cache makes its
          # post-job save step fail ("Cache folder path ... doesn't exist on disk") on any cache miss
          # (e.g. when packages.lock.json changes). The job needs no restored packages, so caching is
          # disabled rather than worked around.
          cache: false

      - name: Bootstrap
        shell: pwsh
        run: ./.github/ci-scripts/Actions_Bootstrap.ps1

      - name: Run PR smoke validation
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Invoke-Build -File ./build/DLLPickle.Build.ps1 -Task Analyze,Test

      - name: Validate live upstream conflict-surface freshness
        if: needs.pr-changes.outputs.live_validation == 'true'
        shell: pwsh
        run: |
          # Freshness check, NOT a bundle validation. Recompute the upstream module conflict surface
          # whenever the policy, bundle dependency files, or fingerprint-producing tools change.
          #
          # This step does NOT validate the bumped bundle itself. A self-bump of DLLPickle's own NuGet
          # references does not change what the upstream modules ship, so it will not move this
          # fingerprint. The bumped bundle is validated separately by the "Build Module" workflow, which
          # on every PR touching src/** runs the full build under --locked-mode plus the #193 / Azure.Core
          # integration repro guards, bounded by the csproj floating-with-cap constraints. For auto-merge
          # to actually wait on those signals, the Build Module and Dependency Review checks must be
          # configured as required status checks (see Dependabot-Auto-Approve.yml).
          $ErrorActionPreference = 'Stop'
          ./tools/Get-DLLPickleUpstreamInventory.ps1 `
            -PolicyPath ./build/dependency-policy.json `
            -ModuleCachePath ./artifacts/upstreamCompatibility/modules `
            -OutputPath ./artifacts/upstreamCompatibility/upstream-inventory.json `
            -Force
          ./tools/New-DLLPickleConflictMatrix.ps1 `
            -InventoryPath ./artifacts/upstreamCompatibility/upstream-inventory.json `
            -OutputPath ./artifacts/upstreamCompatibility/conflict-matrix.json | Out-Null
          $policy = Get-Content ./build/dependency-policy.json -Raw | ConvertFrom-Json
          $current = Get-Content ./artifacts/upstreamCompatibility/conflict-matrix.json -Raw | ConvertFrom-Json
          $inventory = Get-Content ./artifacts/upstreamCompatibility/upstream-inventory.json -Raw | ConvertFrom-Json
          $fingerprint = [string]$current.Fingerprint
          $baseline = [string]$policy.baseline.conflictSurfaceFingerprint
          $comparison = $null
          if ($policy.baseline.PSObject.Properties.Name -contains 'conflictSurface') {
            $baselineMatrix = [PSCustomObject]@{
              Assemblies = @($policy.baseline.conflictSurface | ForEach-Object {
                [PSCustomObject]@{
                  Name = [string]$_.name
                  Versions = @($_.versions)
                  ShippedBy = @($_.shippedBy)
                  Diverges = $true
                  AlcOwner = $null
                }
              })
            }
            $comparison = ./tools/Compare-DLLPickleConflictMatrix.ps1 -Baseline $baselineMatrix -Current $current
          }

          $report = [PSCustomObject]@{
            BaselineFingerprint = $baseline
            CurrentFingerprint = $fingerprint
            ModuleVersions = [ordered]@{}
            Comparison = $comparison
          }
          foreach ($module in $inventory.Modules) { $report.ModuleVersions[[string]$module.Name] = [string]$module.Version }
          $report | ConvertTo-Json -Depth 20 | Set-Content ./artifacts/upstreamCompatibility/comparison-report.json -Encoding utf8NoBOM

          @(
            '# Upstream conflict-surface freshness'
            ''
            "- Baseline fingerprint: ``$baseline``"
            "- Current fingerprint: ``$fingerprint``"
            ''
            '| Module | Version |'
            '| --- | --- |'
            ($inventory.Modules | Sort-Object Name | ForEach-Object { "| $($_.Name) | $($_.Version) |" })
          ) | Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY -Encoding utf8

          if ($comparison -and $comparison.HasMaterialDrift) {
            @(
              ''
              '## Structured drift'
              ''
              '```json'
              ($comparison | ConvertTo-Json -Depth 20)
              '```'
            ) | Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY -Encoding utf8
          }

          if ($fingerprint -ne $baseline) {
            Write-Host "::error::Upstream conflict surface changed (baseline '$baseline' -> '$fingerprint'). The preload/block decision this bundle is built against may be stale: re-adjudicate and update build/dependency-policy.json (classification + evidence + baseline) per docs/Architecture.md section 8 before merging."
            throw 'Upstream conflict-surface drift detected; blocking merge until re-adjudicated.'
          }
          Write-Host "Upstream conflict surface unchanged (fingerprint '$fingerprint'); the recorded preload/block baseline still holds. (Bundle correctness is validated separately by the Build Module workflow.)"

      - name: Validate preload TFM alignment (Step 0b)
        if: needs.pr-changes.outputs.live_validation == 'true'
        shell: pwsh
        run: |
          # docs/Architecture.md section 8.2 Step 0(b): when a PR changes the bundled dependency set
          # (csproj / packages.lock.json), prove each preload package ships a portable net8.0/
          # netstandard2.0 asset before it can be auto-merged. This runs on the PR gate that
          # Dependabot auto-merge waits on, so a bundle bump cannot merge on 0a (Build gate) alone.
          $ErrorActionPreference = 'Stop'
          dotnet restore ./src/DLLPickle.Build/DLLPickle.csproj --locked-mode
          $report = ./tools/Test-DLLPickleTfmAlignment.ps1 `
            -PolicyPath ./build/dependency-policy.json `
            -LockFilePath ./src/DLLPickle.Build/packages.lock.json `
            -OutputPath ./artifacts/upstreamCompatibility/tfm-alignment.json `
            -Strict
          @(
            '# Preload TFM alignment (net8.0)'
            ''
            "- Aligned: ``$($report.IsAligned)``"
            ''
            '| Package | Version | Aligned | Compatible assets |'
            '| --- | --- | --- | --- |'
            ($report.Packages | ForEach-Object { "| $($_.PackageName) | $($_.ResolvedVersion) | $($_.IsAligned) | $((@($_.CompatibleAssets) -join ', ')) |" })
          ) | Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY -Encoding utf8

      - name: Upload PR upstream compatibility evidence
        if: ${{ always() && needs.pr-changes.outputs.live_validation == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: upstream-compatibility-pr-${{ github.event.pull_request.number }}-${{ github.run_id }}
          path: |
            ./artifacts/upstreamCompatibility/upstream-inventory.json
            ./artifacts/upstreamCompatibility/conflict-matrix.json
            ./artifacts/upstreamCompatibility/comparison-report.json
            ./artifacts/upstreamCompatibility/tfm-alignment.json
          if-no-files-found: warn
          retention-days: 14

  pr-gate:
    name: Validate upstream compatibility tooling
    needs: [pr-changes, pr-smoke-validation]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Report aggregate validation result
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -ne 'pull_request') {
            Write-Host 'Aggregate PR gate is not applicable to this event.'
            exit 0
          }

          $DetectionResult = '${{ needs.pr-changes.result }}'
          $Relevant = '${{ needs.pr-changes.outputs.relevant }}'
          $ValidationResult = '${{ needs.pr-smoke-validation.result }}'
          if ($DetectionResult -ne 'success') {
            throw "Changed-file detection did not succeed: $DetectionResult"
          }
          if ($Relevant -eq 'true' -and $ValidationResult -ne 'success') {
            throw "Relevant upstream-compatibility validation did not succeed: $ValidationResult"
          }
          if ($Relevant -eq 'false' -and $ValidationResult -notin @('skipped', 'success')) {
            throw "Irrelevant-path validation had an unexpected result: $ValidationResult"
          }
          Write-Host "Upstream compatibility aggregate gate passed (relevant=$Relevant, validation=$ValidationResult)."

  scheduled-upstream-compatibility:
    name: Validate latest upstream module compatibility
    if: github.event_name != 'pull_request'
    runs-on: windows-2025
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: "8.0.x"
          cache: true
          cache-dependency-path: "src/DLLPickle.Build/packages.lock.json"

      - name: Bootstrap
        shell: pwsh
        run: ./.github/ci-scripts/Actions_Bootstrap.ps1

      - name: Inventory latest upstream modules
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          ./tools/Get-DLLPickleUpstreamInventory.ps1 `
            -PolicyPath ./build/dependency-policy.json `
            -ModuleCachePath ./artifacts/upstreamCompatibility/modules `
            -OutputPath ./artifacts/upstreamCompatibility/upstream-inventory.json `
            -Force

      - name: Detect conflict-surface drift
        id: drift
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'
          ./tools/New-DLLPickleConflictMatrix.ps1 `
            -InventoryPath ./artifacts/upstreamCompatibility/upstream-inventory.json `
            -OutputPath ./artifacts/upstreamCompatibility/conflict-matrix.json | Out-Null
          $policy = Get-Content ./build/dependency-policy.json -Raw | ConvertFrom-Json
          $current = Get-Content ./artifacts/upstreamCompatibility/conflict-matrix.json -Raw | ConvertFrom-Json
          $inventory = Get-Content ./artifacts/upstreamCompatibility/upstream-inventory.json -Raw | ConvertFrom-Json
          $surface = @($current.ConflictSurface | Sort-Object)
          # Versions-aware fingerprint produced by New-DLLPickleConflictMatrix (single source of the
          # algorithm) so a within-major version move on a still-conflicting assembly is detected,
          # not just name-set changes. (ALC-ownership drift is the runtime-probe / maintainer tier.)
          $fingerprint = [string]$current.Fingerprint
          $baseline = [string]$policy.baseline.conflictSurfaceFingerprint
          $comparison = $null
          if ($policy.baseline.PSObject.Properties.Name -contains 'conflictSurface') {
            $baselineMatrix = [PSCustomObject]@{
              Assemblies = @($policy.baseline.conflictSurface | ForEach-Object {
                [PSCustomObject]@{
                  Name = [string]$_.name
                  Versions = @($_.versions)
                  ShippedBy = @($_.shippedBy)
                  Diverges = $true
                  AlcOwner = $null
                }
              })
            }
            $comparison = ./tools/Compare-DLLPickleConflictMatrix.ps1 -Baseline $baselineMatrix -Current $current
          }
          $report = [PSCustomObject]@{
            BaselineFingerprint = $baseline
            CurrentFingerprint = $fingerprint
            ModuleVersions = [ordered]@{}
            Comparison = $comparison
          }
          foreach ($module in $inventory.Modules) { $report.ModuleVersions[[string]$module.Name] = [string]$module.Version }
          $report | ConvertTo-Json -Depth 20 | Set-Content ./artifacts/upstreamCompatibility/comparison-report.json -Encoding utf8NoBOM

          @(
            '# Scheduled upstream compatibility'
            ''
            "- Baseline fingerprint: ``$baseline``"
            "- Current fingerprint: ``$fingerprint``"
            ''
            '| Module | Version |'
            '| --- | --- |'
            ($inventory.Modules | Sort-Object Name | ForEach-Object { "| $($_.Name) | $($_.Version) |" })
          ) | Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY -Encoding utf8
          if ($fingerprint -ne $baseline) {
            Write-Host "::warning::Conflict surface changed (baseline '$baseline' -> '$fingerprint'). The preload decision in build/dependency-policy.json needs human review."
            "drift=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            $Title = 'Conflict-surface drift detected'
            $Body = @(
              'The DLLPickle conflict surface changed versus the recorded baseline.'
              ''
              "Baseline fingerprint: ``$baseline``"
              "Current fingerprint: ``$fingerprint``"
              ''
              'Current monitored modules:'
              ($inventory.Modules | Sort-Object Name | ForEach-Object { "- $($_.Name) $($_.Version)" })
              ''
              'Current conflict surface:'
              ($surface | ForEach-Object { "- $_" })
              ''
              'Workflow evidence:'
              '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
              ''
              'Re-run the runtime ALC adjudication and update build/dependency-policy.json (classification + evidence + baseline) per docs/Architecture.md section 8.'
            ) -join [System.Environment]::NewLine
            $Existing = gh issue list --state open --search "$Title in:title" --json number --jq '.[0].number'
            if ([string]::IsNullOrWhiteSpace($Existing)) { gh issue create --title $Title --body $Body }
            else { gh issue comment $Existing --body $Body }
          } else {
            Write-Host "Conflict surface unchanged (fingerprint '$fingerprint')."
            "drift=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          }

      - name: Generate candidate dependency updates
        if: steps.drift.outputs.drift != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          ./tools/Update-DLLPickleDependencyPins.ps1 `
            -InventoryPath ./artifacts/upstreamCompatibility/upstream-inventory.json `
            -PolicyPath ./build/dependency-policy.json `
            -ProjectPath ./src/DLLPickle.Build/DLLPickle.csproj `
            -OutputPath ./artifacts/upstreamCompatibility/candidate-report.json `
            -Restore

      - name: Validate candidate update
        if: steps.drift.outputs.drift != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          dotnet restore ./src/DLLPickle.Build/DLLPickle.csproj --locked-mode
          Invoke-Build -File ./build/DLLPickle.Build.ps1 -Task IssueReproTest

      - name: Inspect preload TFM alignment (Step 0b)
        if: steps.drift.outputs.drift != 'true'
        shell: pwsh
        run: |
          # docs/Architecture.md section 8.2 Step 0(b): the explicit half of "TFM alignment". The
          # Build gate (0a) proves restore+build green under --locked-mode; this proves each preload
          # package actually ships a net8.0/netstandard2.0-compatible asset (not just transitive luck).
          # The preceding --locked-mode restore populated the NuGet global-packages folder, so the
          # tool can inspect each resolved package's lib/<tfm>/ assets. Fail-closed: a misaligned
          # candidate must not proceed on the automated path.
          $ErrorActionPreference = 'Stop'
          $report = ./tools/Test-DLLPickleTfmAlignment.ps1 `
            -PolicyPath ./build/dependency-policy.json `
            -LockFilePath ./src/DLLPickle.Build/packages.lock.json `
            -OutputPath ./artifacts/upstreamCompatibility/tfm-alignment.json
          @(
            '# Preload TFM alignment (net8.0)'
            ''
            "- Aligned: ``$($report.IsAligned)``"
            ''
            '| Package | Version | Aligned | Compatible assets |'
            '| --- | --- | --- | --- |'
            ($report.Packages | ForEach-Object { "| $($_.PackageName) | $($_.ResolvedVersion) | $($_.IsAligned) | $((@($_.CompatibleAssets) -join ', ')) |" })
          ) | Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY -Encoding utf8
          if (-not $report.IsAligned) {
            Write-Host "::error::Preload TFM alignment failed for: $((@($report.Misaligned)) -join ', '). A candidate that fails the explicit net8.0/netstandard2.0 asset check (docs/Architecture.md section 8.2 Step 0b) must not proceed."
            throw 'TFM alignment check failed; blocking candidate generation.'
          }
          Write-Host "Preload TFM alignment passed: every preload package ships a net8.0-compatible asset."

      - name: Detect generated changes
        if: steps.drift.outputs.drift != 'true'
        id: generated_changes
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $Changed = -not [string]::IsNullOrWhiteSpace((git status --short -- src/DLLPickle.Build/DLLPickle.csproj src/DLLPickle.Build/packages.lock.json))
          "has_changes=$($Changed.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Create candidate pull request
        if: steps.drift.outputs.drift != 'true' && steps.generated_changes.outputs.has_changes == 'true' && (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.create_pull_request))
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'
          $BranchName = 'automation/upstream-compatibility-${{ github.run_id }}'
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git switch -c $BranchName
          git add src/DLLPickle.Build/DLLPickle.csproj src/DLLPickle.Build/packages.lock.json
          git commit -m 'deps: update upstream compatibility pins'
          git push --set-upstream origin $BranchName
          gh pr create `
            --title 'deps: update upstream compatibility pins' `
            --body 'Automated upstream compatibility validation detected a safe candidate dependency pin update. The workflow regenerated the NuGet lock file and validated the issue reproduction suite before opening this PR.' `
            --base main `
            --head $BranchName

      - name: Upload upstream compatibility artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: upstream-compatibility-${{ github.run_id }}
          path: |
            ./artifacts/upstreamCompatibility/upstream-inventory.json
            ./artifacts/upstreamCompatibility/conflict-matrix.json
            ./artifacts/upstreamCompatibility/comparison-report.json
            ./artifacts/upstreamCompatibility/candidate-report.json
            ./artifacts/upstreamCompatibility/tfm-alignment.json
          if-no-files-found: warn
          retention-days: 30

      - name: Open issue when scheduled compatibility validation fails
        if: failure()
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $Title = 'Upstream compatibility automation failed'
          $Body = @(
            'The scheduled upstream compatibility workflow failed.'
            ''
            'Review the workflow run and uploaded artifacts for details:'
            '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
            ''
            'This workflow is fail-closed. It does not publish or merge dependency preload changes unless inventory, candidate generation, restore, build, and issue repro validation all pass.'
          ) -join [System.Environment]::NewLine
          $ExistingIssue = gh issue list --state open --search "$Title in:title" --json number --jq '.[0].number'
          if ([string]::IsNullOrWhiteSpace($ExistingIssue)) {
            gh issue create --title $Title --body $Body
          } else {
            gh issue comment $ExistingIssue --body $Body
          }
