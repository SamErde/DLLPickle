# https://help.github.com/en/actions/automating-your-workflow-with-github-actions
# https://help.github.com/en/actions/automating-your-workflow-with-github-actions/virtual-environments-for-github-hosted-runners
# https://help.github.com/en/actions/automating-your-workflow-with-github-actions/software-installed-on-github-hosted-runners
# https://help.github.com/en/actions/automating-your-workflow-with-github-actions/workflow-syntax-for-github-actions#using-a-specific-shell
# https://help.github.com/en/actions/automating-your-workflow-with-github-actions/workflow-syntax-for-github-actions
# https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-powershell
# https://github.com/actions/upload-artifact#where-does-the-upload-go
name: Build Module (Windows)

description: Builds and tests the DLLPickle PowerShell module on Windows. Can be run manually or called by other workflows.

on:
  workflow_call:
    inputs:
      ref:
        description: "Git reference (branch, tag, or commit SHA) to check out. Defaults to the ref that triggered the caller workflow."
        type: string
        required: false
  workflow_dispatch:
  pull_request:
    paths:
      - "src/**"
      - ".github/workflows/Build Module - Windows.yml"
  #push:
  #  branches:
  #    - main
  #  paths:
  #    - "src/**"
  #    - ".github/workflows/Build Module - Windows.yml"

permissions:
  contents: read

concurrency:
  group: build-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:

  build:

    name: Build and test module (Windows)
    runs-on: windows-latest
    strategy:
      fail-fast: false
    steps:

    - name: Check out repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        ref: ${{ inputs.ref || github.ref }}

    - name: Cache PowerShell modules
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: |
          ~\Documents\PowerShell\Modules
          ~\Documents\WindowsPowerShell\Modules
        key: ${{ runner.os }}-psmodules-${{ hashFiles('build/DLLPickle.Build.ps1', '.github/ci-scripts/Actions_Bootstrap.ps1') }}
        restore-keys: |
          ${{ runner.os }}-psmodules-

    - name: Bootstrap
      shell: pwsh
      run: ./.github/ci-scripts/Actions_Bootstrap.ps1

    - name: Test and Build
      shell: pwsh
      run: Invoke-Build -File ./build/DLLPickle.Build.ps1

    - name: Upload pester results
      if: always() # Ensure this step runs even if prior steps fail
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: pester-results
        path: ./artifacts/TestOutput
        if-no-files-found: warn

    - name: Upload zip module archive build
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: zip-archive
        path: ./archive
        if-no-files-found: warn

    - name: Upload module directory
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: module-build
        path: ./module/DLLPickle
        if-no-files-found: warn
