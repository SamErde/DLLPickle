# Auto-approves and auto-merges Dependabot pull requests that update the NuGet packages in src/DLLPickle.Build (patch/minor only).
# Major updates are converted to a draft PR with detailed review notes (decision 4 / docs/Architecture.md section 8.2) -- never auto-merged or auto-published.
#
# Requirements:
#
#   - A GitHub App installed on this repository with repository permissions:
#       Pull requests: Read & write, Contents: Read & write
#
#   - Repository *Dependabot* secrets (Settings > Secrets and variables > Dependabot):
#       CLIENT_ID        the GitHub App's Client ID
#       APP_PRIVATE_KEY  the GitHub App's private key (PEM)
#
#     NOTE: Dependabot-triggered runs read Dependabot secrets, NOT Actions secrets.
#
#   - Repository rules requiring "Build gate", "Validate upstream compatibility tooling", and
#     "dependency-review", so `--auto` cannot complete until bundle, policy, and security checks pass.
#   - "Allow auto-merge" enabled under Settings > General > Pull Requests.

name: 🤖 Auto-Approve Dependabot NuGet Package Updates

on: pull_request
permissions: {}
concurrency:
  group: dependabot-approve-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  dependabot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Gate on both the triggering actor AND the PR author, so a commit pushed by a different account onto a Dependabot branch cannot ride this write-scoped token.
    if: >-
      github.actor == 'dependabot[bot]' &&
      github.event.pull_request.user.login == 'dependabot[bot]'

    steps:

      - name: 🔍 Validate GitHub App secrets
        id: validate_secrets
        shell: bash
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          echo "Validating required GitHub App secrets..."

          if [ -z "${CLIENT_ID:-}" ]; then
            echo "❌ ERROR: CLIENT_ID is not configured"
            echo "This workflow requires GitHub App authentication to function."
            echo ""
            echo "Add these as repository Dependabot secrets"
            echo "(Settings > Secrets and variables > Dependabot):"
            echo "  - CLIENT_ID:       the GitHub App's Client ID"
            echo "  - APP_PRIVATE_KEY: the GitHub App's private key (PEM)"
            echo ""
            echo "See: https://docs.github.com/en/apps/creating-github-apps/"
            exit 1
          fi

          if [ -z "${APP_PRIVATE_KEY:-}" ]; then
            echo "❌ ERROR: APP_PRIVATE_KEY is not configured"
            echo "This workflow requires GitHub App authentication to function."
            exit 1
          fi

          echo "✅ Required secrets are configured"

      - name: 🔐 Generate GitHub App token
        id: generate_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          # Least-privilege: mint a token with only the scopes approve + auto-merge need, rather than the App's full granted permission set.
          permission-contents: write
          permission-pull-requests: write

      - name: 🤖 Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          github-token: ${{ steps.generate_token.outputs.token }}

      - name: 📦 Require an exact NuGet-only file set
        id: nuget_check
        shell: bash
        env:
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          FILES=$(gh api "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/files" --paginate --jq '.[].filename')
          MATCHING_FILES=$(printf '%s\n' "$FILES" | sed '/^$/d' | grep -E '^src/DLLPickle\.Build/(DLLPickle\.csproj|packages\.lock\.json)$' || true)
          UNEXPECTED_FILES=$(printf '%s\n' "$FILES" | sed '/^$/d' | grep -Ev '^src/DLLPickle\.Build/(DLLPickle\.csproj|packages\.lock\.json)$' || true)

          if [ -n "$MATCHING_FILES" ] && [ -z "$UNEXPECTED_FILES" ]; then
            echo "is_exact_nuget_update=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_exact_nuget_update=false" >> "$GITHUB_OUTPUT"
            if [ -n "$UNEXPECTED_FILES" ]; then
              echo "Refusing auto-approval because the PR changes files outside the NuGet allow-list:"
              printf '%s\n' "$UNEXPECTED_FILES"
            fi
          fi

      # The repository ruleset requires Build gate, Validate upstream compatibility tooling, and
      # dependency-review, so `--auto` waits for all three before this PR can merge.

      - name: ✅ Approve and auto-merge NuGet patch/minor updates
        if: |
          steps.nuget_check.outputs.is_exact_nuget_update == 'true' &&
          steps.metadata.outputs.update-type != 'version-update:semver-major'
        shell: bash
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          UPDATE_TYPE: ${{ steps.metadata.outputs.update-type }}
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
        run: |
          set -euo pipefail
          gh pr review --approve "$PR_URL" --body "✅ Auto-approved: NuGet ${UPDATE_TYPE} update"
          gh pr merge --auto --squash "$PR_URL"

      - name: 📝 Convert major version updates to a reviewed draft PR
        if: |
          steps.nuget_check.outputs.is_exact_nuget_update == 'true' &&
          steps.metadata.outputs.update-type == 'version-update:semver-major'
        shell: bash
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          UPDATE_TYPE: ${{ steps.metadata.outputs.update-type }}
          DEP_NAMES: ${{ steps.metadata.outputs.dependency-names }}
          PREV_VERSION: ${{ steps.metadata.outputs.previous-version }}
          NEW_VERSION: ${{ steps.metadata.outputs.new-version }}
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
        run: |
          set -euo pipefail
          echo "⏭️ Major version update: converting to a reviewed draft (no auto-merge, no auto-publish)."

          # Decision 4 (docs/Architecture.md section 8.2): a major upstream bump is still fully tested,
          # but it lands as a DRAFT PR with detailed notes rather than auto-merging. A maintainer
          # promotes it to ready and merges after sign-off; the merge then publishes a MAJOR module
          # release (carry the squash commit as `breaking:`).
          gh pr ready --undo "$PR_URL"

          # Build a real NuGet package link from the first reported dependency (no fabricated changelog URL).
          FIRST_DEP="$(printf '%s' "${DEP_NAMES:-}" | head -n1 | cut -d',' -f1 | tr -d ' ')"
          if [ -n "$FIRST_DEP" ]; then
            NUGET_LINK="https://www.nuget.org/packages/${FIRST_DEP}"
          else
            NUGET_LINK="(package name unavailable from Dependabot metadata)"
          fi

          gh pr comment "$PR_URL" --body "🔔 **Major dependency update — draft for review (not auto-merged, not auto-published)**

          Per the tracked-dependency release contract (decision 4 / \`docs/Architecture.md\` §8.2), a major upstream bump is fully tested but lands as a **draft PR** with detailed notes. A maintainer promotes it to *ready* and merges after sign-off; the merge then publishes a **major** module release (carry the squash commit as \`breaking:\`).

          **Dependencies:** \`${DEP_NAMES:-unknown}\`

          **Version change:** \`${PREV_VERSION:-unknown}\` → \`${NEW_VERSION:-unknown}\`

          **Update type:** \`${UPDATE_TYPE}\`

          **Package:** ${NUGET_LINK} — see the package's Release Notes / changelog for breaking changes.

          **TFM alignment (§8.2 Step 0)**

          - 0a — Build gate: restore/build/test green on \`net8.0\` under \`--locked-mode\`. See the Checks tab: ${PR_URL}/checks
          - 0b — explicit net8.0/netstandard2.0 asset inspection: run \`tools/Test-DLLPickleTfmAlignment.ps1\` against the bumped package(s); the scheduled Upstream-Compatibility candidate flow runs this fail-closed.

          **Pester / CI:** ${PR_URL}/checks

          **Conflict surface / policy impact:** a major upstream jump can move the conflict surface. Re-check the Upstream-Compatibility drift gate and re-adjudicate \`build/dependency-policy.json\` (classification + evidence + baseline) per §3 if it moved.

          **Maintainer checklist (complete before marking ready)**

          - [ ] Re-adjudicate the §3 preload/block classifications for the bumped package(s).
          - [ ] Confirm TFM alignment: 0a (Build gate green) and 0b (\`Test-DLLPickleTfmAlignment.ps1\`).
          - [ ] Refresh the \`build/dependency-policy.json\` baseline if the conflict surface moved.
          - [ ] Auth-tier real-environment sign-off per §9 (the 2.0.1 precedent) for any bundled-set change.
          - [ ] Merge carrying a \`breaking:\` prefix so the release publishes a **major** module version."
