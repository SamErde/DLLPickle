# Add at the beginning for better documentation:
# This workflow automatically approves and merges Dependabot PRs for NuGet package updates
# Requirements:
#   - GitHub App with PRs read/write permissions
#   - Secrets: APP_ID and APP_PRIVATE_KEY

name: 🤖 Auto-Approve Dependabot NuGet Package Updates
on: pull_request

permissions: {}

concurrency:
  group: dependabot-approve-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  dependabot:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    # Permissions are now handled by the App Token, so we don't need job-level overrides

    steps:
      - name: 🔍 Validate GitHub App Secrets
        id: validate_secrets
        shell: bash
        run: |
          echo "Validating required GitHub App secrets..."
          
          if [ -z "${{ secrets.CLIENT_ID }}" ]; then
            echo "❌ ERROR: secrets.CLIENT_ID is not configured"
            echo "This workflow requires GitHub App authentication to function."
            echo ""
            echo "Setup Instructions:"
            echo "1. Create a GitHub App or use an existing organization app"
            echo "2. Generate a private key for the app"
            echo "3. Add these secrets to your repository:"
            echo "   - secrets.CLIENT_ID: The GitHub App's Client ID"
            echo "   - secrets.APP_PRIVATE_KEY: The GitHub App's private key"
            echo ""
            echo "See: https://docs.github.com/en/apps/creating-github-apps/"
            exit 1
          fi
          
          if [ -z "${{ secrets.APP_PRIVATE_KEY }}" ]; then
            echo "❌ ERROR: secrets.APP_PRIVATE_KEY is not configured"
            echo "This workflow requires GitHub App authentication to function."
            exit 1
          fi
          
          echo "✅ Required secrets are configured"

      - name: Generate GitHub App Token
        id: generate_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          # REPLACED
          github-token: "${{ steps.generate_token.outputs.token }}"

      - name: Check if NuGet packages were updated
        id: nuget_check
        run: |
          set -e
          MATCHING_FILES=$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json files --jq '
            .files[].path | select(
              . == "src/DLLPickle.Build/DLLPickle.csproj" or
              . == "src/DLLPickle.Build/packages.lock.json"
            )
          ')

          if [ -n "$MATCHING_FILES" ]; then
            echo "is_nuget_update=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_nuget_update=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          # REPLACED
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}

      # Note: Dependency Review is handled by the dedicated 'Dependency Review' workflow
      # which runs on all PRs. This should be configured as a required check to ensure
      # it completes before auto-merge happens.

      - name: Approve and auto-merge NuGet patch/minor updates
        if: |
          steps.nuget_check.outputs.is_nuget_update == 'true' &&
          steps.metadata.outputs.update-type != 'version-update:semver-major'
        run: |
          set -e
          gh pr review --approve "$PR_URL" --body "✅ Auto-approved: NuGet ${{ steps.metadata.outputs.update-type }} update"
          gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          # REPLACED
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}

      - name: Comment on major version updates
        if: |
          steps.nuget_check.outputs.is_nuget_update == 'true' &&
          steps.metadata.outputs.update-type == 'version-update:semver-major'
        run: |
          echo "⏭️ Skipping major version update - requires manual review"
          gh pr comment "$PR_URL" --body "🔔 **Major version update detected**

          This PR updates one or more NuGet packages to a new major version, which may include breaking changes.

          **Action Required:** Manual review and approval is required before merging.

          - Review the package changelog for breaking changes
          - Test the build and functionality locally
          - Approve and merge manually when ready

          Package update type: \`${{ steps.metadata.outputs.update-type }}\`"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
