# Deploy MkDocs from the `/docs` folder to GitHub Pages on the `ghpages` branch.

name: 📖 Deploy MkDocs to GitHub Pages

on:
  # Run when changes are made to the contents of the docs folder, README, the MkDocs config, or this workflow.
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - ".github/workflows/Deploy MkDocs.yml"
      - "README.md"
      - "mkdocs.yml"
  # Allow manual triggering of the workflow.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build and Deploy Documentation Site
    permissions:
      contents: write # Needed for gh-deploy to push to 'ghpages' branch

    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: ✅ Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: 📄 Copy README to docs
        run: cp README.md docs/index.md

      - name: 🐍 Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.x"
          cache: "pip"
          cache-dependency-path: "docs/requirements.txt"

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r docs/requirements.txt

      - name: 👷‍♂️ Deploy MkDocs to GitHub Pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mkdocs gh-deploy --force

      - name: 📋 Deployment Summary
        if: success()
        run: |
          echo "✅ Documentation successfully deployed to GitHub Pages"
          echo "🔗 View at: https://day3bits.com/DLLPickle"
