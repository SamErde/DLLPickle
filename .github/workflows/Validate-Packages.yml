name: Validate .NET Packages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/DLLPickle.Build/**'
      - 'src/DLLPickle.Build/packages.lock.json'
      - '.github/workflows/Validate-Packages.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/DLLPickle.Build/**'
      - 'src/DLLPickle.Build/packages.lock.json'
      - '.github/workflows/Validate-Packages.yml'

concurrency:
  group: ci-build-test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    name: Build .NET Packages (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows PowerShell 5.1
            os: windows-2025
          - name: Windows PowerShell Core
            os: windows-2025

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: '8.0.x'
          cache: true
          cache-dependency-path: 'src/DLLPickle.Build/packages.lock.json'

      - name: Restore dependencies (Windows PowerShell 5.1)
        if: matrix.name == 'Windows PowerShell 5.1'
        shell: powershell
        run: dotnet restore src/DLLPickle.Build/DLLPickle.csproj --locked-mode

      - name: Restore dependencies (PowerShell Core)
        if: matrix.name != 'Windows PowerShell 5.1'
        shell: pwsh
        run: dotnet restore src/DLLPickle.Build/DLLPickle.csproj --locked-mode

      - name: Build (Windows PowerShell 5.1)
        if: matrix.name == 'Windows PowerShell 5.1'
        shell: powershell
        run: dotnet build src/DLLPickle.Build/DLLPickle.csproj --configuration Release --no-restore

      - name: Build (PowerShell Core)
        if: matrix.name != 'Windows PowerShell 5.1'
        shell: pwsh
        run: dotnet build src/DLLPickle.Build/DLLPickle.csproj --configuration Release --no-restore
