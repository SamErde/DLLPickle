name: 🚀 Release and Publish

on:
  pull_request:
    types: [closed]
    branches:
      - main
    paths:
      - "src/DLLPickle/**"
      - "module/**"
  workflow_dispatch:
    inputs:
      version_bump:
        description: "Optionally override the automatic version bump that is automatically determined by conventional commit message analysis. (Skip for auto-detection.)"
        required: false
        type: choice
        options:
          - major
          - minor
          - patch

# Prevent concurrent releases
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: read

env:
  MODULE_NAME: DLLPickle
  MODULE_DIR: ./module/DLLPickle
  MANIFEST_PATH: ./src/DLLPickle/DLLPickle.psd1

jobs:
  analyze:
    name: Analyze and Determine Version
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Only run for merged PRs to main or manual dispatch
    if: |
      github.repository_owner == 'SamErde' &&
      (
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
      )

    permissions:
      contents: read
      pull-requests: read

    outputs:
      should_release: ${{ steps.determine_version.outputs.should_release }}
      version_bump: ${{ steps.determine_version.outputs.version_bump }}
      current_version: ${{ steps.determine_version.outputs.current_version }}
      new_version: ${{ steps.determine_version.outputs.new_version }}
      previous_tag: ${{ steps.determine_version.outputs.previous_tag }}
      trigger_source: ${{ steps.determine_version.outputs.trigger_source }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.merge_commit_sha || github.ref }}

      - name: Determine version and bump type
        id: determine_version
        shell: pwsh
        env:
          EVENT_NAME: ${{ github.event_name }}
          MANUAL_BUMP: ${{ inputs.version_bump }}
          MERGE_COMMIT: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          # Pass manual bump parameter to Get-VersionBump for centralized version logic
          Write-Host "Analyzing version requirements..."

          # Only pass manual bump if explicitly specified (not empty or auto)
          $ManualBumpParam = if ([string]::IsNullOrEmpty($env:MANUAL_BUMP) -or $env:MANUAL_BUMP -eq 'auto') {
              ''
          } else {
              $env:MANUAL_BUMP
          }

          try {
              if (-not [string]::IsNullOrEmpty($ManualBumpParam)) {
                  Write-Host "Manual version bump specified: $ManualBumpParam"
                  $VersionResult = & ./.github/ci-scripts/Get-VersionBump.ps1 -ManualBump $ManualBumpParam -ErrorAction Stop
              } else {
                  Write-Host "Using automatic conventional commit analysis"
                  $VersionResult = & ./.github/ci-scripts/Get-VersionBump.ps1 -ErrorAction Stop
              }
          } catch {
              Write-Error "Failed to analyze version requirements: $_"
              exit 1
          }

          $ShouldRelease  = $VersionResult.ShouldRelease
          $NewVersionType = $VersionResult.NewVersionType
          $NewVersion     = $VersionResult.NewVersion
          $CurrentVersion = [version]$VersionResult.CurrentVersion

          Write-Host "`nVersion Analysis Results:"
          Write-Host "Current version: $($CurrentVersion.ToString())"
          Write-Host "Version bump type: $NewVersionType"
          Write-Host "New version: $NewVersion"
          Write-Host "Should release: $ShouldRelease"

          # Determine workflow trigger
          if ($env:EVENT_NAME -eq "workflow_dispatch") {
              $TriggerSource = "manual"
          } elseif ($env:EVENT_NAME -eq "pull_request") {
              $TriggerSource = "pr-merge"
          } else {
              $TriggerSource = "push"
          }
          Write-Host "Trigger source: $TriggerSource"

          # Find the previous tag for release notes generation
          $PreviousTag = $null
          $Tags = @(git tag --list 'v*' --sort=-v:refname 2>$null)
          if ($LASTEXITCODE -eq 0 -and $Tags.Count -gt 0) {
              $PreviousTag = $Tags[0]
              Write-Host "Previous tag: $PreviousTag"
          } else {
              Write-Host "No previous tags found"
          }

          if (-not $ShouldRelease) {
              Write-Host "No release needed based on commit analysis"
              "should_release=false" >> $env:GITHUB_OUTPUT
              "version_bump=none" >> $env:GITHUB_OUTPUT
              "current_version=$($CurrentVersion.ToString())" >> $env:GITHUB_OUTPUT
              "previous_tag=$PreviousTag" >> $env:GITHUB_OUTPUT
              "trigger_source=$TriggerSource" >> $env:GITHUB_OUTPUT
              exit 0
          }

          # Set outputs
          "should_release=true" >> $env:GITHUB_OUTPUT
          "version_bump=$NewVersionType" >> $env:GITHUB_OUTPUT
          "current_version=$($CurrentVersion.ToString())" >> $env:GITHUB_OUTPUT
          "new_version=$NewVersion" >> $env:GITHUB_OUTPUT
          "previous_tag=$PreviousTag" >> $env:GITHUB_OUTPUT
          "trigger_source=$TriggerSource" >> $env:GITHUB_OUTPUT

      - name: Display release plan
        if: steps.determine_version.outputs.should_release == 'true'
        shell: pwsh
        run: |
          $summary = @"
          ## 📋 Release Plan

          **Trigger:** ${{ steps.determine_version.outputs.trigger_source }}
          **Version Bump:** ${{ steps.determine_version.outputs.version_bump }}
          **Version:** ${{ steps.determine_version.outputs.current_version }} → ${{ steps.determine_version.outputs.new_version }}

          ### Steps
          1. ✓ Analyzed version requirements
          2. → Update module manifest
          3. → Build and test
          4. → Create GitHub release
          5. → Publish to PSGallery
          "@

          Write-Host $summary
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $summary

  update-version:
    name: Update Module Version
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: analyze
    if: needs.analyze.outputs.should_release == 'true'

    permissions:
      contents: write

    outputs:
      new_version: ${{ needs.analyze.outputs.new_version }}

    steps:

      - name: Generate GitHub App Token
        id: generate_token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.generate_token.outputs.token }}
          fetch-depth: 0
          ref: ${{ github.event.pull_request.merge_commit_sha || github.ref }}

      - name: Update module manifest version
        shell: pwsh
        run: |
          $updateResult = & ./.github/ci-scripts/Update-ModuleVersion.ps1 -ManifestPath "$($env:MANIFEST_PATH)" -NewVersion "${{ needs.analyze.outputs.new_version }}"

          if (-not $updateResult.Success) {
              Write-Error "Failed to update module manifest: $($updateResult.ErrorMessage)"
              exit 1
          }

      - name: Commit version update
        shell: pwsh
        run: |
          # The commit will now correctly use the App's identity and permissions
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add $env:MANIFEST_PATH
          if ($LASTEXITCODE -ne 0) {
              Write-Error "Failed to stage manifest file"
              exit 1
          }

          git commit -m "chore(release): bump version to ${{ needs.analyze.outputs.new_version }}"
          if ($LASTEXITCODE -ne 0) {
              Write-Error "Failed to commit version update"
              exit 1
          }

          git push origin HEAD:main
          if ($LASTEXITCODE -ne 0) {
              Write-Error "Failed to push version update to main"
              exit 1
          }

          Write-Host "✓ Version update committed and pushed"

      - name: Create version tag
        shell: pwsh
        env:
          # 3. Swap PAT_TOKEN for the App Token here as well
          GH_TOKEN: ${{ steps.generate_token.outputs.token }}
        run: |
          $version = "${{ needs.analyze.outputs.new_version }}"
          $tagName = "v$version"

          Write-Host "Creating tag: $tagName"

          $commitSha = git rev-parse HEAD

          git tag -a $tagName -m "Release $version" $commitSha
          git push origin $tagName

          if ($LASTEXITCODE -ne 0) {
              Write-Error "Failed to create and push tag"
              exit 1
          }

          Write-Host "✓ Tag created: $tagName"

  build-and-test:
    name: Build and Test Module
    uses: ./.github/workflows/Build Module - Windows.yml
    needs: update-version
    with:
      ref: main

  sync-module-manifest:
    name: Sync Updated Manifest to Module Folder
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [update-version, build-and-test]

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: main

      - name: Download module artifact
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: module-build
          path: ./module/DLLPickle

      - name: Sync updated manifest to module folder
        shell: pwsh
        run: |
          # Ensure module folder exists
          if (-not (Test-Path ./module/DLLPickle)) {
              New-Item -Path ./module/DLLPickle -ItemType Directory -Force | Out-Null
          }

          try {
              # Verify source manifest exists
              if (-not (Test-Path $env:MANIFEST_PATH)) {
                  throw "Source manifest not found at $env:MANIFEST_PATH"
              }

              # Copy the updated manifest from src to the module folder
              Copy-Item -Path $env:MANIFEST_PATH -Destination ./module/DLLPickle/DLLPickle.psd1 -Force -ErrorAction Stop
              Write-Host "✓ Manifest copied to module folder"

              # Verify the copy was successful
              if (-not (Test-Path ./module/DLLPickle/DLLPickle.psd1)) {
                  throw "Manifest not found after copying to ./module/DLLPickle/DLLPickle.psd1"
              }

              # Verify the new version is in place
              $modulePsd1 = Import-PowerShellDataFile -Path ./module/DLLPickle/DLLPickle.psd1 -ErrorAction Stop
              $moduleVersion = $modulePsd1.ModuleVersion
              $expectedVersion = "${{ needs.update-version.outputs.new_version }}"

              Write-Host "Module manifest version: $moduleVersion"
              Write-Host "Expected version: $expectedVersion"

              if ($moduleVersion -ne $expectedVersion) {
                  throw "Version mismatch after sync: module has $moduleVersion but expected $expectedVersion"
              }

              Write-Host "✓ Manifest synced successfully. Module version: $moduleVersion"
          } catch {
              Write-Error "Manifest sync failed: $_"
              exit 1
          }

      - name: Upload updated module
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: module-build-synced
          path: ./module/DLLPickle
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [analyze, update-version, build-and-test, sync-module-manifest]

    permissions:
      contents: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Check if release already exists
        id: check_release
        shell: pwsh
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = "${{ needs.analyze.outputs.new_version }}"
          $tagName = "v$version"

          try {
              $release = gh release view $tagName --json id 2>$null
              if ($release) {
                  Write-Host "Release $tagName already exists"
                  "exists=true" >> $env:GITHUB_OUTPUT
              } else {
                  Write-Host "Release $tagName does not exist yet"
                  "exists=false" >> $env:GITHUB_OUTPUT
              }
          } catch {
              Write-Host "Release $tagName does not exist"
              "exists=false" >> $env:GITHUB_OUTPUT
          }

      - name: Generate release notes
        id: release_notes
        if: steps.check_release.outputs.exists == 'false'
        shell: pwsh
        run: |
          $version = "${{ needs.analyze.outputs.new_version }}"
          $lastTag = "${{ needs.analyze.outputs.previous_tag }}"

          if ($lastTag) {
              $commits = git log "$lastTag..HEAD" --oneline --no-decorate 2>$null
          } else {
              $commits = git log --oneline --no-decorate 2>$null | Select-Object -First 20
          }

          $releaseNotes = @"
          ## Changes in v$version

          **Version Bump:** ${{ needs.analyze.outputs.version_bump }}
          **Triggered by:** ${{ needs.analyze.outputs.trigger_source }}

          ### Recent Commits
          ``````
          $commits
          ``````

          ### Links
          - **PowerShell Gallery:** https://www.powershellgallery.com/packages/${{ env.MODULE_NAME }}/$version
          - **View on GitHub:** https://github.com/${{ github.repository }}/releases/tag/v$version

          ---
          *Released by GitHub Actions*
          "@

          # Encode for safe output passing
          $encodedNotes = [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes($releaseNotes))
          "notes_base64=$encodedNotes" >> $env:GITHUB_OUTPUT

      - name: Create GitHub release
        if: steps.check_release.outputs.exists == 'false'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = "${{ needs.analyze.outputs.new_version }}"
          $tagName = "v$version"

          # Decode the release notes
          $encodedNotes = "${{ steps.release_notes.outputs.notes_base64 }}"
          $releaseNotes = [Text.Encoding]::UTF8.GetString([Convert]::FromBase64String($encodedNotes))

          Write-Host "Creating release for $tagName"

          # Create the release
          gh release create $tagName `
            --title "Release $version" `
            --notes $releaseNotes `
            --draft=false `
            --prerelease=false

          if ($LASTEXITCODE -ne 0) {
              Write-Error "Failed to create GitHub release"
              exit 1
          }

          Write-Host "✓ GitHub release created: $tagName"

  publish:
    name: Publish to PowerShell Gallery
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [analyze, build-and-test, create-release, sync-module-manifest]
    environment:
      name: psgallery
      url: https://www.powershellgallery.com/packages/${{ env.MODULE_NAME }}

    permissions:
      contents: read

    steps:

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 0

      - name: Download module artifact (synced)
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: module-build-synced
          path: ./module/DLLPickle

      - name: Verify module version before publishing
        shell: pwsh
        run: |
          $modulePath = "./module/DLLPickle/DLLPickle.psd1"
          if (-not (Test-Path $modulePath)) {
              Write-Error "Module manifest not found at $modulePath"
              exit 1
          }

          $moduleManifest = Import-PowerShellDataFile -Path $modulePath
          $moduleVersion = $moduleManifest.ModuleVersion
          $expectedVersion = "${{ needs.analyze.outputs.new_version }}"

          Write-Host "Module path: $modulePath"
          Write-Host "Module version: $moduleVersion"
          Write-Host "Expected version: $expectedVersion"

          if ($moduleVersion -ne $expectedVersion) {
              Write-Error "Version mismatch in module artifact: has $moduleVersion but expected $expectedVersion"
              exit 1
          }

          Write-Host "✓ Module version verified: $moduleVersion"

      - name: Check if version already published
        id: check_published
        shell: pwsh
        run: |
          $version = "${{ needs.analyze.outputs.new_version }}"

          try {
              Set-PSRepository -Name PSGallery -InstallationPolicy Trusted -ErrorAction SilentlyContinue
              $published = Find-Module -Name $env:MODULE_NAME -RequiredVersion $version -ErrorAction SilentlyContinue

              if ($published) {
                  Write-Host "Version $version is already published to PSGallery"
                  "already_published=true" >> $env:GITHUB_OUTPUT
              } else {
                  Write-Host "Version $version not found in PSGallery, proceeding with publish"
                  "already_published=false" >> $env:GITHUB_OUTPUT
              }
          } catch {
              Write-Host "Could not check PSGallery, assuming not published. Error: $_"
              "already_published=false" >> $env:GITHUB_OUTPUT
          }

      - name: Publish to PowerShell Gallery
        if: steps.check_published.outputs.already_published == 'false'
        shell: pwsh
        env:
          PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:PSGALLERY_API_KEY)) {
              Write-Error "PSGALLERY_API_KEY secret is not configured"
              exit 1
          }

          $publishResult = & ./.github/ci-scripts/Publish-ToGallery.ps1 `
            -ModuleDirectory "$($env:MODULE_DIR)" -ApiKey "$($env:PSGALLERY_API_KEY)"

          if (-not $publishResult.Success) {
              Write-Error "Publishing failed: $($publishResult.Message)`nError: $($publishResult.ErrorMessage)"
              exit 1
          }

          Write-Host "✓ Module published successfully"
          Write-Host "Gallery URL: $($publishResult.GalleryUrl)"

  rollback-on-failure:
    name: Rollback on Release Failure
    runs-on: ubuntu-latest
    needs: [analyze, update-version, build-and-test, create-release, publish, sync-module-manifest]
    if: |
      failure() && (
        needs.create-release.result == 'failure' ||
        needs.publish.result == 'failure' ||
        needs.sync-module-manifest.result == 'failure'
      )

    permissions:
      contents: write

    steps:

      - name: Generate GitHub App Token
        id: generate_token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.generate_token.outputs.token }}
          fetch-depth: 0

      - name: Revert version bump and delete tag
        shell: pwsh
        env:
          GH_TOKEN: ${{ steps.generate_token.outputs.token }}
        run: |
          $version = "${{ needs.analyze.outputs.new_version }}"
          $tagName = "v$version"

          Write-Host "🔄 Rolling back version $version due to release failure..."

          # Delete remote tag (ignore errors if tag doesn't exist yet)
          Write-Host "Deleting tag: $tagName"
          git push origin --delete $tagName 2>$null
          if ($LASTEXITCODE -eq 0) {
              Write-Host "✓ Tag deleted"
          } else {
              Write-Host "⚠ Tag not found (may not have been created)"
          }

          # Revert the version bump commit (reset to the commit before the bump)
          Write-Host "Reverting version bump commit..."
          try {
              # Verify we have a previous commit
              $commitCount = git rev-list --count HEAD -ErrorAction Stop
              if ($commitCount -lt 2) {
                  Write-Warning "Cannot revert: only $commitCount commit(s) exist in repository"
              } else {
                  $previousCommit = git rev-parse HEAD~1 -ErrorAction Stop
                  git reset --hard $previousCommit -ErrorAction Stop
                  git push origin HEAD:main --force -ErrorAction Stop
                  Write-Host "✓ Version bump reverted"
              }
          } catch {
              Write-Error "Failed to revert version bump: $_"
              exit 1
          }

      - name: Delete GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ steps.generate_token.outputs.token }}
        continue-on-error: true
        run: |
          $version = "${{ needs.analyze.outputs.new_version }}"
          $tagName = "v$version"

          Write-Host "Deleting GitHub release: $tagName"
          gh release delete $tagName --yes 2>$null
          Write-Host "✓ GitHub release deleted (if it existed)"

      - name: Rollback summary
        shell: pwsh
        run: |
          $summary = @"
          ## 🚨 Release Failed - Rollback Complete

          **Module:** ${{ env.MODULE_NAME }}
          **Version:** ${{ needs.analyze.outputs.new_version }}

          The release process failed. The following have been reverted:

          - ✓ Version bump commit removed from main
          - ✓ Git tag deleted
          - ✓ GitHub release deleted (if created)

          **Build artifacts are preserved** in the workflow run for investigation.

          ### Failed Steps
          - Create Release: ${{ needs.create-release.result }}
          - Publish: ${{ needs.publish.result }}

          Please review the failed job logs, address the issue, and retry the release.
          "@

          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $summary

  summary:
    name: Release Summary
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [analyze, update-version, build-and-test, create-release, publish, rollback-on-failure, sync-module-manifest]
    if: always()

    permissions:
      contents: read

    steps:

      - name: Generate summary
        shell: pwsh
        run: |
          $summary = @"
          ## 🎉 Release Complete

          **Module:** ${{ env.MODULE_NAME }}
          **Version:** ${{ needs.analyze.outputs.new_version }}
          **Bump Type:** ${{ needs.analyze.outputs.version_bump }}
          **Trigger:** ${{ needs.analyze.outputs.trigger_source }}

          ### Workflow Status
          | Step | Status |
          |------|--------|
          | Analyze | ${{ needs.analyze.result }} |
          | Update Version | ${{ needs.update-version.result }} |
          | Build & Test | ${{ needs.build-and-test.result }} |
          | Sync Manifest | ${{ needs.sync-module-manifest.result }} |
          | Create Release | ${{ needs.create-release.result }} |
          | Publish | ${{ needs.publish.result }} |
          | Rollback | ${{ needs.rollback-on-failure.result }} |

          ### Links
          - **Release:** https://github.com/${{ github.repository }}/releases/tag/v${{ needs.analyze.outputs.new_version }}
          - **Gallery:** https://www.powershellgallery.com/packages/${{ env.MODULE_NAME }}/${{ needs.analyze.outputs.new_version }}
          - **Workflow Run:** https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

          ---
          _Released by: @${{ github.actor }}_
          "@

          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $summary
