# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
# https://devblogs.microsoft.com/dotnet/using-dependabot-to-manage-dotnet-sdk-updates/
# https://learn.microsoft.com/en-us/dotnet/core/tools/global-json

version: 2
updates:
  - package-ecosystem: "devcontainers"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"

  - package-ecosystem: "docker"
    directory: "/.devcontainer"
    schedule:
      interval: "weekly"
      day: "sunday"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
    groups:
      all-actions:
        patterns: ["*"]
    commit-message:
      prefix: "ci"
      prefix-development: "ci"

  - package-ecosystem: "nuget"
    directory: "/src/DLLPickle.Build/"
    schedule:
      interval: "daily"
    groups:
      nuget-minor-patch:
        patterns: ["*"]
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Azure.Core 1.51.0+ takes a dependency on the .NET 10 BCL (System.Text.Json /
      # System.Diagnostics.DiagnosticSource / Microsoft.Bcl.AsyncInterfaces 10.x), which cannot load
      # under PowerShell 7.4 (.NET 8). Pin at 1.50.x until the module multi-targets newer runtimes.
      # Patch updates within 1.50.x stay net8-safe and remain allowed.
      - dependency-name: "Azure.Core"
        update-types: ["version-update:semver-minor", "version-update:semver-major"]
    commit-message:
      prefix: "deps"
      prefix-development: "deps"
    # Note: Major version PRs are created but require manual approval. The Dependabot-Auto-Approve workflow handles selective auto-approval:
    # - Auto-approves: patch and minor updates
    # - Requires manual review: major version updates

  - package-ecosystem: "pip"
    directory: "/docs/"
    schedule:
      interval: "weekly"
      day: "sunday"
    commit-message:
      prefix: "docs"
      prefix-development: "docs"
